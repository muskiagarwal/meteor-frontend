<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in — Meteor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --lime:#C5F135;--lime-d:#a8d020;--black:#0d0d0d;--dark:#111827;
    --text:#374151;--muted:#6b7280;--light:#9ca3af;
    --border:#e5e7eb;--bg-off:#f9fafb;--white:#ffffff;
  }
  html{height:100%}
  body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg-off);color:var(--dark);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  a{text-decoration:none;color:inherit}
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif}

  .auth-top{padding:20px 28px;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:8px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:17px;color:var(--black)}
  .logo-mark{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .auth-top-link{font-size:14px;color:var(--muted)}
  .auth-top-link a{color:var(--black);font-weight:600}
  .auth-top-link a:hover{text-decoration:underline}

  .auth-body{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 20px 48px}
  .auth-card{width:100%;max-width:400px}
  .auth-head{margin-bottom:28px;text-align:center}
  .auth-head h1{font-size:28px;font-weight:800;letter-spacing:-0.025em;color:var(--black);margin-bottom:6px}
  .auth-head p{font-size:14px;color:var(--muted);line-height:1.6}

  .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px 20px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--dark);cursor:pointer;transition:background .18s,border-color .18s,box-shadow .18s;margin-bottom:20px}
  .btn-google:hover{background:var(--bg-off);border-color:#d1d5db;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .g-icon{width:18px;height:18px;flex-shrink:0}

  .or-divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .or-divider span{font-size:12px;color:var(--light);white-space:nowrap;font-weight:500}

  .form-row{margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:5px}
  .label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
  .label-row label{margin-bottom:0}
  .forgot-link{font-size:12px;color:var(--muted);transition:color .18s}
  .forgot-link:hover{color:var(--black)}
  input[type=email],input[type=password]{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--dark);background:var(--white);outline:none;transition:border-color .18s,box-shadow .18s}
  input:focus{border-color:var(--black);box-shadow:0 0 0 3px rgba(13,13,13,.07)}
  input::placeholder{color:var(--light)}

  .btn-submit{width:100%;padding:12px;border:none;border-radius:10px;background:var(--black);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s;margin-top:6px}
  .btn-submit:hover{background:#222;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2)}

  .auth-switch{text-align:center;margin-top:22px;font-size:13px;color:var(--muted)}
  .auth-switch a{color:var(--black);font-weight:600}
  .auth-switch a:hover{text-decoration:underline}

  /* Social proof */
  .signin-proof{text-align:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--border)}
  .proof-avatars{display:flex;justify-content:center;margin-bottom:8px}
  .proof-av{width:28px;height:28px;border-radius:50%;border:2px solid var(--white);margin-left:-8px;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-size:10px;font-weight:700}
  .proof-av:first-child{margin-left:0}
  .proof-text{font-size:12px;color:var(--muted)}
  .proof-text strong{color:var(--dark)}
  </style>
</head>
<body>

<div class="auth-top">
  <a href="/" class="logo">
    <div class="logo-mark">
      <svg width="12" height="16" viewBox="0 0 12 16" fill="none">
          <defs><linearGradient id="boltGrad" x1="0" y1="16" x2="12" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#C5F135"/><stop offset="100%" stop-color="#40c9c0"/></linearGradient></defs>
          <path d="M7.5 1L1 9.5H5.5L3.5 15L11 6.5H6.5L7.5 1Z" fill="url(#boltGrad)"/>
      </svg>
    </div>
    Meteor
  </a>
  <span class="auth-top-link">New to Meteor? <a href="/auth/signup.html">Create account</a></span>
</div>

<div class="auth-body">
  <div class="auth-card">
    <div class="auth-head">
      <h1>Welcome back</h1>
      <p>Sign in to continue your job search.</p>
    </div>

    <button class="btn-google" type="button">
      <svg class="g-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="or-divider"><span>or continue with email</span></div>

    <form onsubmit="return false">
      <div class="form-row">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="alex@company.com" autocomplete="email"/>
      </div>
      <div class="form-row">
        <div class="label-row">
          <label for="password">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-submit">Sign in →</button>
    </form>

    <p class="auth-switch">New to Meteor? <a href="/auth/signup.html">Create a free account</a></p>

    <div class="signin-proof">
      <div class="proof-avatars">
        <div class="proof-av" style="background:#dcfce7;color:#16a34a">S</div>
        <div class="proof-av" style="background:#dbeafe;color:#1d4ed8">M</div>
        <div class="proof-av" style="background:#fce7f3;color:#9d174d">A</div>
        <div class="proof-av" style="background:#fef9c3;color:#854d0e">J</div>
        <div class="proof-av" style="background:rgba(197,241,53,.2);color:#3a5c00">R</div>
      </div>
      <p class="proof-text"><strong>50,000+</strong> job seekers found their role with Meteor</p>
    </div>
  </div>
</div>

</body>
</html>
